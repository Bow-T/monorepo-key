<?xml version="1.0" encoding="UTF-8"?>
<!--
  Bow Go — menu-bar template icon
  Pure black on transparent (a macOS "template image"): the system recolors it
  for light/dark menu bars. Simplified bow + arrow-key so it stays legible at
  ~18px. Drawn on a 36x36 grid (2x of an 18pt status item).
-->
<svg width="36" height="36" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="#000000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bow limb (recurve C) -->
    <path d="M11 6 C 6.5 11 6.5 25 11 30"/>
    <!-- Bow string -->
    <path d="M11 6 L11 30" stroke-width="1.6"/>
    <!-- Arrow / key shaft -->
    <path d="M11 18 L24.5 18"/>
  </g>
  <!-- Key teeth -->
  <g fill="#000000">
    <rect x="20" y="19.5" width="2.2" height="4.4" rx="1"/>
  </g>
  <!-- Key head (ring) -->
  <circle cx="28.5" cy="18" r="4.5" fill="none" stroke="#000000" stroke-width="3"/>
</svg>
